  function cerrarRegalosDesdeIframe() {
    if (window.parent && typeof window.parent.cerrarRegalos === 'function') {

    }
  }
</script>

<script>
  // ===========================================================
  // 🪙 REGALO DE MONEDAS (canje único)
  // -----------------------------------------------------------
  // No usa el sistema de códigos de la galería (botonCopiar):
  // llama directo a window.parent.agregarMonedas() y se bloquea
  // con su propio flag en localStorage, separado del de las cartas.
  //
  // 👉 Para agregar otro regalo de monedas en el futuro, copiá el
  //    bloque <div class="compra">...</div> de arriba, cambiá el
  //    data-monedas (cantidad) y el data-id (debe ser único, es lo
  //    que se usa para que no se pueda canjear dos veces).
  // ===========================================================
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".botonMonedas").forEach(boton => {
      const cantidad = parseInt(boton.getAttribute("data-monedas"), 10) || 0;
      const id = boton.getAttribute("data-id") || "default";
      const clave = "monedas_canjeado_" + id;

      if (localStorage.getItem(clave) === "true") {
        desactivarBotonMonedas(boton);
      }

      boton.addEventListener("click", () => {
        if (localStorage.getItem(clave) === "true") return;

        if (window.parent && typeof window.parent.agregarMonedas === "function") {
          window.parent.agregarMonedas(cantidad);
        }

        localStorage.setItem(clave, "true");
        desactivarBotonMonedas(boton);
        mostrarCartelMonedas(cantidad); // 🪙 mismo cartel que usan las legendarias
      });
    });

    // 🔔 Avisar al menú principal si hay (o no) regalos sin canjear
    if (window.parent && typeof window.parent.actualizarBadgeRegalos === "function") {
      window.parent.actualizarBadgeRegalos();
    }
  });

  function desactivarBotonMonedas(boton) {
    boton.textContent = "CANJEADO";
    boton.classList.remove("botonMonedas");
    boton.classList.add("botonCanjeado");
    boton.disabled = true;
  }
</script>
